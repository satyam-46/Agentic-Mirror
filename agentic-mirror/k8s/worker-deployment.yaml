apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentic-worker
  template:
    metadata:
      labels:
        app: agentic-worker
    spec:
      containers:
        - name: worker
          image: agentic-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: agentic-worker
spec:
  selector:
    app: agentic-worker
  ports:
    - name: http
      port: 8001
      targetPort: 8001
